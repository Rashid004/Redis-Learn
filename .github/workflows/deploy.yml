name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test --if-present

  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/redis-learn:${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
            ${{ secrets.DOCKER_USERNAME }}/redis-learn:${{ github.sha }}

  deploy-staging:
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Deploy to Staging EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/redis-learn:staging
            docker stop redis-learn || true
            docker rm redis-learn || true
            docker run -d \
              --name redis-learn \
              --restart always \
              -p 3000:3000 \
              -e MONGO_URI="${{ secrets.MONGO_URI }}" \
              -e REDIS_HOST="localhost" \
              -e REDIS_PORT="6379" \
              -e PORT="3000" \
              --network host \
              ${{ secrets.DOCKER_USERNAME }}/redis-learn:staging

  deploy-production:
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Production EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/redis-learn:production
            docker stop redis-learn || true
            docker rm redis-learn || true
            docker run -d \
              --name redis-learn \
              --restart always \
              -p 3000:3000 \
              -e MONGO_URI="${{ secrets.MONGO_URI }}" \
              -e REDIS_HOST="localhost" \
              -e REDIS_PORT="6379" \
              -e PORT="3000" \
              --network host \
              ${{ secrets.DOCKER_USERNAME }}/redis-learn:production
